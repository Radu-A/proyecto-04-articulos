<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link th:href="@{/styles/style.css}" rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<title th:text="${titulo}"></title>
</head>
<body>
	<main>
		<a th:href="@{'/articulos/listado'}">← Volver</a>
		<h1 th:text="${cabecera} + ': ' + ${articulo.nombre}"></h1>
		<ul>
			<li><p>
					Id: <span th:text="${articulo.id}"></span>
				</p></li>
			<li><p>
					Nombre: <span th:text="${articulo.nombre}"></span>
				</p></li>
			<li><p>
					Precio: <span th:text="${articulo.precio}"></span>
				</p></li>
			<li><p>
					Stock: <span th:text="${articulo.stock}"></span>
				</p></li>
		</ul>
	</main>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>
</html>
