<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link th:href="@{/styles/style.css}" rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<title th:text="${titulo}"></title>
</head>
<body>
	<main>
		<a th:href="@{'/articulos/listado'}">← Volver</a>
		<h1 th:text="${cabecera}"></h1>

		<form th:action="@{/articulos/guardar}" th:object="${articulo}"
			method='POST'>
			<input type="hidden" th:field="*{id}" />
			<div class="form-group">
				<label>Nombre</label> <input
					class="form-control" th:field="*{nombre}">
			</div>
			<div class="form-group">
				<label>Precio</label> <input
					class="form-control" th:field="*{precio}">
			</div>
			<div class="form-group">
				<label>Stock</label> <input
					class="form-control" th:field="*{stock}">
			</div>
			<br>
			<button type="submit" class="btn btn-primary" th:text="${boton}"></button>
		</form>

	</main>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>
</html>
