<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link th:href="@{/styles/style.css}" rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<title th:text="${titulo}"></title>
</head>
<body>
	<main>
		<h1 th:text="${cabecera}"></h1>
		<div th:if="${articulos != null && articulos.size() != 0}">
			<a th:href="@{/articulos/nuevo}">Añadir nuevo articulo</a>
			<table>
				<thead>
					<tr>
						<th>ID</th>
						<th>NOMBRE</th>
						<th>PRECIO</th>
						<th>STOCK</th>
						<th colspan="4">ACCIONES</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="articulo : ${articulos}">
						<td th:text="${articulo.id}"></td>
						<td th:text="${articulo.nombre}"></td>
						<td th:text="${articulo.precio}"></td>
						<td th:text="${articulo.stock}"></td>
						<td><a th:href="@{'/articulos/detalles/' + ${articulo.id}}"
							th:text="${accion1}"
							type="button" class="btn btn-primary"></a></td>
						<td><a th:href="@{'/articulos/borrar/' + ${articulo.id}}"
							th:text="${accion2}"
							type="button" class="btn btn-success"></a></td>
						<td><a th:href="@{'/articulos/form/' + ${articulo.id}}"
							th:text="${accion3}"></a></td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>
</html>
